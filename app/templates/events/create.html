{% extends "base.html" %}

{% block title %}Créer un événement - TicketBooking{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-success text-white">
        <h4>➕ Créer un nouvel événement</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="titre" class="form-label">Titre *</label>
                <input type="text" class="form-control" id="titre" name="titre" required>
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date et heure *</label>
                <input type="datetime-local" class="form-control" id="date" name="date" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="capacite" class="form-label">Capacité *</label>
                    <input type="number" class="form-control" id="capacite" name="capacite" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="categorie" class="form-label">Catégorie</label>
                    <select class="form-select" id="categorie" name="categorie">
                        <option value="concert">Concert</option>
                        <option value="spectacle">Spectacle</option>
                        <option value="conference">Conférence</option>
                        <option value="sport">Sport</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Créer</button>
            <a href="{{ url_for('event.index') }}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
